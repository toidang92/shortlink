# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # ====================
  # GitHub Actions Updates
  # ====================
  - package-ecosystem: "github-actions"
    target-branch: "main"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    reviewers:
      - "toidang92"
    assignees:
      - "toidang92"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    open-pull-requests-limit: 3

  # ====================
  # Ruby Dependencies (Bundler)
  # ====================
  - package-ecosystem: "bundler"
    target-branch: "main"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "UTC"
    reviewers:
      - "toidang92"
    assignees:
      - "toidang92"
    labels:
      - "dependencies"
      - "ruby"
    commit-message:
      prefix: "deps"
      include: "scope"
    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 10
    groups:
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "rspec*"
          - "rubocop*"
          - "brakeman"
          - "debug"
        update-types:
          - "minor"
          - "patch"
      dev-dependencies:
        patterns:
          - "rspec*"
          - "rubocop*"
          - "brakeman"
          - "debug"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "rails"
        update-types: ["version-update:semver-major"]
